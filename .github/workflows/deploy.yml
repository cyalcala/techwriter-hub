name: Deploy TechWriter Hub
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # 🚀 Heartbeat: Auto-refresh data every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build TechWriter Hub
        run: |
          cd apps/frontend
          bun run build

      - name: Debug Deployment Env
        run: |
          echo "Checking Secrets Visibility..."
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then echo "❌ TOKEN MISSING"; else echo "✅ TOKEN DETECTED"; fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then echo "❌ ACCOUNT_ID MISSING"; else echo "✅ ACCOUNT_ID DETECTED"; fi

      - name: Deploy to Cloudflare Pages
        run: |
          # 🚀 Direct deployment via Wrangler CLI to bypass Git/Action conflicts
          cd apps/frontend
          bunx wrangler pages deploy dist --project-name=techwriter-hub --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
