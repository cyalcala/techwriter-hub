name: Deploy TechWriter Hub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build TechWriter Hub
        run: |
          cd apps/frontend
          bun run build --verbose

      - name: Deploy to Cloudflare Pages
        run: |
          # 🚀 Direct deployment via Wrangler CLI to bypass Git/Action conflicts
          cd apps/frontend
          bunx wrangler pages deploy dist --project-name=techwriter-hub --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
